# 启用真实 Claude Code Runner 的 compose 覆盖文件。
# 用法：docker compose -f docker-compose.yml -f docker-compose.claude.yml up
#
# API 配置通过项目 .env 文件管理，不从宿主机 shell 读取，
# 避免与宿主机 Claude Code 配置冲突。
services:
  rpg4pov:
    env_file:
      - .env
    environment:
      # 固定配置（不从 .env 读取）
      - AGENT_RUNNER=claude
      - TURN_TIMEOUT_MS=180000
